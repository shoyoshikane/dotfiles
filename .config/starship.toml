format = """
$directory\
$git_branch\
$git_status\
$aws\
$fill\
$cmd_duration\
$time\
\n$character
"""

add_newline = true

[fill]
symbol = 'вФА'

[directory]
truncation_length = 5
truncate_to_repo = false
truncation_symbol = 'пБЉ ' # nf-fa-folder_open
home_symbol = '~'
read_only = ' у∞МЊ ' # nf-md-lock
style = 'bold fg:#313244 bg:#80EBDF'
read_only_style = 'bold fg:#313244 bg:#80EBDF'
format = """
[оВґ](fg:#80EBDF)\
[$path]($style)\
[$read_only]($read_only_style)\
[оВЉ](fg:#80EBDF)\
"""

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

# AWS module
[aws]
format = '[$symbol $profile ]($style)'
symbol = "вШБпЄП"
style = "bold fg:#ffcb6b"

[gcloud]
disabled = true

[git_branch]
symbol = "пРШ"
style = "fg:#769ff0 bg:#1d2230"
format = """
[оВЇ](fg:#1d2230)\
[$symbol $branch]($style)\
"""

[git_status]
style = "fg:#769ff0 bg:#1d2230"
format = """
[$all_status$ahead_behind]($style)\
[оВЉ](fg:#1d2230)\
"""

[cmd_duration]
min_time = 1
style = 'fg:#e0af68'
format = "[$duration]($style)" # nf-pl-right_soft_divider, nf-mdi-clock

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
# style = "bg:#1d2230"
format = '[[ оВ≥ пАЧ $time ](fg:#a0a9cb)]($style)'

[character]
vimcmd_symbol = '[V](bold green) '
